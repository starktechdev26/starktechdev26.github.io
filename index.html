<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack | Stark Tech</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra styles specifically for the premium boot screen */
        .boot-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .glass-terminal {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: left;
            margin-top: 30px;
            height: 250px;
            overflow-y: hidden;
        }
        #jarvis-output {
            font-family: 'Share Tech Mono', monospace;
            color: var(--stark-cyan);
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .cursor {
            font-family: 'Share Tech Mono', monospace;
            color: var(--stark-cyan);
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="energy-field"></div>
    <div class="energy-field-2"></div>

    <div class="boot-container">
        <h1 class="hero-title" style="margin-bottom: 0;">STARK <span class="glitch-text">TECH</span></h1>
        
        <button id="init-btn" class="action-btn" style="max-width: 250px; margin-top: 40px;">INITIALIZE SYSTEM</button>
        
        <div id="terminal-wrapper" class="glass-terminal" style="display: none;">
            <div id="jarvis-output"></div><span class="cursor">_</span>
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById("jarvis-output");
        const terminalWrapper = document.getElementById("terminal-wrapper");
        const initBtn = document.getElementById("init-btn");

        const bootSequence = [
            "Initializing secure uplink...",
            "Bypassing standard grid protocols...",
            "Loading premium glassmorphism UI...",
            "Authenticating Operator: Jack...",
            "Welcome, sir. Mark IV is online.",
            "Routing to dashboard..."
        ];

        let lineIndex = 0;
        let charIndex = 0;

        function typeWriter() {
            if (lineIndex < bootSequence.length) {
                if (charIndex < bootSequence[lineIndex].length) {
                    outputDiv.innerHTML += bootSequence[lineIndex].charAt(charIndex);
                    charIndex++;
                    terminalWrapper.scrollTop = terminalWrapper.scrollHeight;
                    setTimeout(typeWriter, 15); // Fast typing
                } else {
                    outputDiv.innerHTML += "<br><br>";
                    lineIndex++;
                    charIndex = 0;
                    terminalWrapper.scrollTop = terminalWrapper.scrollHeight;
                    setTimeout(typeWriter, 400); // Pause between lines
                }
            } else {
                setTimeout(() => {
                    window.location.href = "portfolio.html"; 
                }, 600); 
            }
        }

        initBtn.addEventListener("click", () => {
            initBtn.style.display = "none";
            terminalWrapper.style.display = "block";
            setTimeout(typeWriter, 400);
        });
    </script>
</body>
</html>
