<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack | Stark Industries System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  
    <div id="boot-screen" class="boot-screen">
        <button id="init-btn" class="init-btn">INITIALIZE SYSTEM</button>
    </div>

    <div class="hologram-grid"></div>
    
    <div class="hud-container">
        <header class="hud-header">
            <h1 class="stark-logo">STARK <span>TECH</span></h1>
            <div class="system-status">SYS: <span class="online">ONLINE</span></div>
        </header>

        <main class="terminal-box">
            <div id="jarvis-output"></div>
            <span class="cursor">_</span>
        </main>
        
        <div class="arc-reactor">
            <div class="reactor-ring outer-ring"></div>
            <div class="reactor-ring coil-ring"></div>
            <div class="reactor-ring inner-ring"></div>
            <div class="reactor-core"></div>
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById("jarvis-output");
        const terminalBox = document.querySelector(".terminal-box");
        const bootScreen = document.getElementById("boot-screen");
        const initBtn = document.getElementById("init-btn");

        const bootSequence = [
            "J.A.R.V.I.S. SYSTEM ONLINE.",
            "Bypassing mainframe...",
            "Accessing Full-Stack Developer profiles...",
            "Loading protocols for Jack...",
            "Welcome, sir. All systems are operating at 100% capacity.",
            "Redirecting to secure database..."
        ];

        let lineIndex = 0;
        let charIndex = 0;

        // Safe Voice Function
        function speakLine(text) {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.pitch = 0.9;
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) {
                console.log("Voice blocked by browser, continuing visual sequence.");
            }
        }

        function typeWriter() {
            if (lineIndex < bootSequence.length) {
                if (charIndex === 0) { speakLine(bootSequence[lineIndex]); }

                if (charIndex < bootSequence[lineIndex].length) {
                    outputDiv.innerHTML += bootSequence[lineIndex].charAt(charIndex);
                    charIndex++;
                    terminalBox.scrollTop = terminalBox.scrollHeight;
                    setTimeout(typeWriter, 50); 
                } else {
                    outputDiv.innerHTML += "<br><br>";
                    lineIndex++;
                    charIndex = 0;
                    terminalBox.scrollTop = terminalBox.scrollHeight;
                    setTimeout(typeWriter, 1200); 
                }
            } else {
                // Redirect to the newly named Mark III OS
                setTimeout(() => {
                    window.location.href = "portfolio.html"; 
                }, 2000); 
            }
        }

        // Engage System
        initBtn.addEventListener("click", () => {
            bootScreen.style.display = "none";
            setTimeout(typeWriter, 500);
        });
    </script>
</body>
</html>
